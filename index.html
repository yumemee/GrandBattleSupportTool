<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>▶ GRAND WAR MONITOR !!!</title>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCBuEBsIBE8hhU50epc8CtyeJn_gQLM2rc",
    authDomain: "grand-war-monitor.firebaseapp.com",
    databaseURL: "https://grand-war-monitor-default-rtdb.firebaseio.com",
    projectId: "grand-war-monitor",
    storageBucket: "grand-war-monitor.firebasestorage.app",
    messagingSenderId: "16814509264",
    appId: "1:16814509264:web:5dcad8ec49928d13c362d5"
  };
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  window.fbDB = db; window.fbRef = ref; window.fbOnValue = onValue;
</script>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080b0f; --surface: #0f1318; --surface2: #161c24;
    --border: #252d3a; --border2: #1e2736; --text: #c8d8e8; --muted: #4a5568;
    --accent: #3b82f6; --attack: #ef4444; --defense: #22c55e;
    --fallen: #f97316; --battle: #eab308;
    --mono: 'Share Tech Mono', monospace; --sans: 'Noto Sans JP', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 13px; min-height: 100vh; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 16px; position: sticky; top: 0; z-index: 100; }
  .status-bar { background: var(--surface); border-bottom: 1px solid var(--border2); padding: 5px 16px; display: flex; align-items: center; gap: 14px; font-family: var(--mono); font-size: 11px; color: var(--muted); position: sticky; top: 103px; z-index: 99; }
  @media (max-width: 630px) { .status-bar { top: 138px; } }
  .day-tabs { display: flex; gap: 4px; margin-left: 15px; }
  .day-tab { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); padding: 2px 8px; border-radius: 3px; cursor: pointer; font-family: var(--mono); font-size: 10px; }
  .day-tab.active { border-color: var(--accent); color: var(--accent); background: #1a2030; }
  .day-tab.today { border-style: dashed; color: var(--text); }
  h1 { font-family: var(--mono); font-size: 13px; letter-spacing: 2px; color: var(--accent); margin-bottom: 10px; }
  .controls { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .ctrl-group { display: flex; align-items: center; gap: 5px; }
  label { font-size: 11px; color: var(--muted); white-space: nowrap; cursor: pointer; }
  select, input[type=number] { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 5px 8px; font-size: 12px; font-family: var(--sans); border-radius: 3px; outline: none; }
  select:focus, input[type=number]:focus { border-color: var(--accent); }
  input[type=number] { width: 75px; }
  
  /* ボタンの文字サイズ設定 */
  button { background: var(--accent); border: 1px solid var(--accent); color: #fff; padding: 5px 14px; font-size: 12px; font-family: var(--sans); border-radius: 3px; cursor: pointer; font-weight: bold; }
  button:hover { opacity: 0.85; }
  button.connected { background: var(--attack); border-color: var(--attack); }
  button.sec { background: transparent; border: 1px solid var(--muted); color: var(--muted); font-weight: normal; font-size: 12px; }
  button.sec:hover { border-color: var(--text); color: var(--text); }
  
  /* グループID検索と同じ12pxに調整 */
  .group-hint { font-size: 12px; color: var(--muted); margin-top: 8px; font-family: var(--sans); }

  #clock { margin-left: auto; font-size: 13px; color: var(--accent); font-weight: bold; letter-spacing: 1px; }
  .main { padding: 12px 16px; }
  .api-error { background: #2a0a0a; border: 1px solid #5a2020; border-radius: 4px; padding: 8px 12px; font-size: 11px; color: #f87171; margin-bottom: 10px; display: none; white-space: pre-wrap; }
  .legend { display: flex; gap: 14px; margin-bottom: 10px; flex-wrap: wrap; font-size: 11px; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .lc { width: 9px; height: 9px; border-radius: 2px; }
  #tableContainer { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { width: 100%; border-collapse: separate; border-spacing: 0; font-family: var(--mono); font-size: 12px; min-width: 820px; background: var(--bg); }
  thead th { background: var(--surface2); box-shadow: inset 0 -1px 0 var(--border), inset -1px 0 0 var(--border2); padding: 10px; text-align: left; color: var(--muted); font-size: 11px; white-space: nowrap; position: sticky; top: 0; z-index: 10; }
  thead th:first-child { position: sticky; left: 0; z-index: 11; background: var(--surface2); }
  tbody td:first-child { position: sticky; left: 0; z-index: 9; background: var(--surface); border-right: 1px solid var(--border); }
  td { padding: 6px 10px; border-bottom: 1px solid var(--border2); border-right: 1px solid var(--border2); white-space: nowrap; }
  .cid-cell { display: flex; align-items: center; gap: 8px; }
  .cid { color: var(--accent); font-weight: bold; min-width: 20px; text-align: center; }
  .cname { color: var(--text); font-family: var(--sans); font-size: 11px; }
  .badge { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: bold; }
  .s1{background:#3d2e00;color:var(--battle)} .s2{background:#3d1000;color:var(--fallen)} .s4{background:#0d3020;color:var(--defense)}
  .cnt { text-align: center; }
  .ca{color:var(--attack)} .cd{color:var(--defense)} .cz{color:var(--muted)}
  .summary-section { margin-bottom: 24px; border-bottom: 1px solid var(--border); padding-bottom: 16px; }
  .summary-title { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-bottom: 12px; }
  .summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
  .summary-card { background: var(--surface); border: 1px solid var(--border2); padding: 10px 12px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; }
  .summary-count { font-family: var(--mono); font-size: 14px; font-weight: bold; color: var(--accent); }
</style>
</head>
<body>
<header id="header">
  <h1>▶ GRAND WAR MONITOR !!!</h1>
  <div class="controls">
    <div class="ctrl-group">
      <label for="groupInput">グループID</label>
      <input type="number" id="groupInput" min="1" max="9999" placeholder="例: 165">
    </div>
    <div class="ctrl-group">
      <label for="classSelect">クラス</label>
      <select id="classSelect">
        <option value="3">Grand Master</option>
        <option value="2">Expert Class</option>
        <option value="1">Elite Class</option>
      </select>
    </div>
    <div class="ctrl-group">
      <label for="blockSelect">ブロック</label>
      <select id="blockSelect">
        <option value="0">Block A</option>
        <option value="1">Block B</option>
        <option value="2">Block C</option>
        <option value="3">Block D</option>
      </select>
    </div>
    <button id="connectBtn">接続</button>
    <button id="resetBtn" class="sec">データリセット</button>
    <button id="lookupBtn" class="sec">グループID検索</button>
  </div>
  <div class="group-hint">グループIDは「グループID検索」で取得できます。</div>
</header>

<div class="status-bar" id="statusBar">
  <span><span class="dot" id="statusDot"></span><span id="statusText">未接続</span></span>
  <div class="day-tabs" id="dayTabs">
    <span class="day-tab" data-day="Tue">TUE</span><span class="day-tab" data-day="Wed">WED</span>
    <span class="day-tab" data-day="Thu">THU</span><span class="day-tab" data-day="Fri">FRI</span>
    <span class="day-tab" data-day="Sat">SAT</span><span class="day-tab" data-day="Sun">SUN</span>
  </div>
  <span id="clock"></span>
</div>

<div class="main">
  <div class="api-error" id="apiError"></div>
  <div id="lookupResult" style="display:none; margin-bottom:10px;">
    <div style="font-size:11px; color:var(--muted); margin-bottom:5px;">グループ一覧:</div>
    <div id="groupList" style="display:flex; gap:6px; flex-wrap:wrap;"></div>
  </div>
  <div id="summaryContainer"></div>
  <div id="tableContainer">
    <div class="no-data" style="text-align:center; padding:50px;"><span>🏰</span>グループIDを入力して接続してください</div>
  </div>
</div>

<script>
const API = 'https://api.mentemori.icu';
const WS_URL = 'wss://api.mentemori.icu/gvg';
const SL = {0:'−',1:'布告中',2:'陥落',3:'反撃',4:'反撃成功'};
const CNAMES = {1:'アイン',2:'イエソド',3:'マルクト',4:'ケテル',5:'テファレト',6:'クシュル',7:'シトリ',8:'トパズ',9:'メラル',10:'ペリド',11:'ファリア',12:'ラピス',13:'ラリマル',14:'マリン',15:'アメト',16:'ラペン',17:'ジルコン',18:'オニキス',19:'フロライト',20:'ガネット',21:'ルラ'};

let ws=null, wsConnected=false;
let guilds={}, castles={}, prevDayCastles={};
let attackStart = {}, defenseStart = {}, fallenStart = {};

function getGvgDaySuffix() {
  const now = new Date();
  const jst = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Tokyo' }));
  if (jst.getHours() < 4) jst.setDate(jst.getDate() - 1);
  const days = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
  let d = days[jst.getDay()];
  return (d === "Mon") ? "Sun" : d;
}

let currentDay = getGvgDaySuffix();
let viewDay = getGvgDaySuffix();

function loadDayData(day) {
  attackStart = JSON.parse(localStorage.getItem(`gw_atk_${day}`) || '{}');
  defenseStart = JSON.parse(localStorage.getItem(`gw_def_${day}`) || '{}');
  fallenStart = JSON.parse(localStorage.getItem(`gw_fal_${day}`) || '{}');
  prevDayCastles = JSON.parse(localStorage.getItem(`gw_castles_${day}`) || '{}');
}

function saveLog() {
  localStorage.setItem(`gw_atk_${currentDay}`, JSON.stringify(attackStart));
  localStorage.setItem(`gw_def_${currentDay}`, JSON.stringify(defenseStart));
  localStorage.setItem(`gw_fal_${currentDay}`, JSON.stringify(fallenStart));
  localStorage.setItem(`gw_castles_${currentDay}`, JSON.stringify(castles));
}

function updateDayTabs() {
  document.querySelectorAll('.day-tab').forEach(tab => {
    tab.classList.toggle('active', tab.dataset.day === viewDay);
    tab.classList.toggle('today', tab.dataset.day === currentDay);
    tab.onclick = () => { viewDay = tab.dataset.day; loadDayData(viewDay); updateDayTabs(); render(); };
  });
}

setInterval(() => {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('ja-JP', { hour12: false, timeZone: 'Asia/Tokyo' });
  const newDay = getGvgDaySuffix();
  if (newDay !== currentDay) { saveLog(); currentDay = newDay; viewDay = newDay; loadDayData(currentDay); updateDayTabs(); render(); }
}, 1000);

const gName=(id)=>!id?'−':(guilds[id]||`ID:${id}`);
const fmtTime = (ts) => {
  if (!ts || ts === '−') return '<span style="color:var(--border)">−</span>';
  return `<span style="color:var(--text)">${new Date(Number(ts)).toLocaleTimeString('ja-JP', { hour12: false, timeZone: 'Asia/Tokyo' })}</span>`;
};

document.getElementById('lookupBtn').onclick = async () => {
  try {
    const r=await fetch(`${API}/wgroups`);
    const j=await r.json();
    const gs=(j.data||[]).filter(g=>g.globalgvg);
    const list=document.getElementById('groupList'); list.innerHTML='';
    gs.forEach(g=>{
      const b=document.createElement('button'); b.className='sec'; b.textContent=`G${g.group_id}`;
      b.onclick=()=>{ document.getElementById('groupInput').value=g.group_id; document.getElementById('lookupResult').style.display='none'; };
      list.appendChild(b);
    });
    document.getElementById('lookupResult').style.display='block';
  } catch(e){ alert('取得失敗'); }
};

function render(){
  const ct = document.getElementById('tableContainer');
  const st = document.getElementById('summaryContainer');
  const isToday = (viewDay === currentDay);
  
  // パーティ数集計を初期化
  const summary = {};
  for (const gid in guilds) { if (gid > 0) summary[gid] = 0; }

  let h=`<table><thead><tr><th>拠点</th><th>所有ギルド</th><th>攻撃ギルド</th><th>状態</th><th class="cnt">攻撃P</th><th class="cnt">防衛P</th><th>🗡開始</th><th>🛡開始</th><th>陥落</th></tr></thead><tbody>`;
  for(let cid=1; cid<=21; cid++){
    const c = isToday ? (castles[cid] || {ownerGuildId:0, attackerGuildId:0, state:0, attackCount:0, defenseCount:0}) : (prevDayCastles[cid] || {ownerGuildId:0, attackerGuildId:0, state:0, attackCount:0, defenseCount:0});
    
    // 集計ロジック修正: 重複カウントを避け、数値として加算
    if(c.ownerGuildId > 0) summary[c.ownerGuildId] = (summary[c.ownerGuildId] || 0) + (parseInt(c.defenseCount) || 0);
    if(c.attackerGuildId > 0) summary[c.attackerGuildId] = (summary[c.attackerGuildId] || 0) + (parseInt(c.attackCount) || 0);
    
    const key = String(cid);
    h+=`<tr><td><div class="cid-cell"><span class="cid">${cid}</span><span class="cname">${CNAMES[cid]}</span></div></td>
      <td>${c.ownerGuildId ? gName(c.ownerGuildId) : '−'}</td><td>${c.attackerGuildId ? gName(c.attackerGuildId) : '−'}</td>
      <td>${c.state ? `<span class="badge s${c.state}">${SL[c.state]}</span>` : '−'}</td>
      <td class="cnt ${c.attackCount>0?'ca':'cz'}">${isToday?c.attackCount:'−'}</td>
      <td class="cnt ${c.defenseCount>0?'cd':'cz'}">${c.defenseCount||'−'}</td>
      <td>${isToday?fmtTime(attackStart[key]):'−'}</td><td>${isToday?fmtTime(defenseStart[key]):'−'}</td><td>${isToday?fmtTime(fallenStart[key]):'−'}</td></tr>`;
  }
  
  let sh = '';
  const activeGids = Object.keys(summary).filter(id => summary[id] >= 0);
  if (activeGids.length > 0) {
    sh = `<div class="summary-section"><div class="summary-title">▶ TOTAL ACTIVE PARTIES</div><div class="summary-grid">`;
    activeGids.sort((a,b) => gName(a).localeCompare(gName(b))).forEach(gid => {
      sh += `<div class="summary-card"><div>${gName(gid)}</div><div class="summary-count">${summary[gid]}<span>P</span></div></div>`;
    });
    sh += `</div></div>`;
  }
  st.innerHTML = sh; ct.innerHTML = h + '</tbody></table>';
}

function parseMsg(dv){
  let off=0;
  while(off+4<=dv.byteLength){
    const sid=dv.getUint32(off,true); off+=4;
    const cid=sid&31;
    if(cid===0){
      const gid=dv.getUint32(off,true); off+=4;
      const nl=dv.getUint8(off); off+=1;
      const name=new TextDecoder().decode(new Uint8Array(dv.buffer, off, nl)); off+=nl;
      guilds[gid]=name; guilds[Math.floor(gid/1000)]=name;
    } else {
      const og=dv.getUint32(off,true); off+=4; const ag=dv.getUint32(off,true); off+=4;
      const ft=dv.getUint32(off,true); off+=4; const dc=dv.getUint16(off,true); off+=2;
      const ac=dv.getUint16(off,true); off+=2; const st=dv.getUint8(off); off+=4;
      const key = String(cid);
      if(currentDay === getGvgDaySuffix()){
        if(ac>0 && !attackStart[key]) attackStart[key]=Date.now();
        if(dc>0 && !defenseStart[key]) defenseStart[key]=Date.now();
        if(st===2 && !fallenStart[key]) fallenStart[key]=Date.now();
        saveLog();
      }
      castles[cid]={ownerGuildId:og,attackerGuildId:ag,defenseCount:dc,attackCount:ac,state:st};
    }
  }
  render();
}

function connect(){
  const gr=document.getElementById('groupInput').value; if(!gr) return;
  const cl=document.getElementById('classSelect').value, bl=document.getElementById('blockSelect').value;
  if(ws) ws.close(); guilds={}; castles={}; loadDayData(currentDay);
  ws=new WebSocket(WS_URL); ws.binaryType='arraybuffer';
  ws.onopen=()=>{ 
    wsConnected=true; document.getElementById('statusText').textContent=`G${gr} 接続中`;
    const buf=new ArrayBuffer(4); new DataView(buf).setUint32(0,(0&31)|((bl&7)<<5)|((gr&255)<<8)|((cl&7)<<16),true); ws.send(buf);
  };
  ws.onmessage=(e)=>parseMsg(new DataView(e.data));
  ws.onclose=()=>{ wsConnected=false; document.getElementById('statusText').textContent='未接続'; };
}

document.getElementById('connectBtn').onclick=connect;
document.getElementById('resetBtn').onclick=()=>{ if(confirm('リセットしますか？')){ localStorage.clear(); location.reload(); }};
loadDayData(viewDay); updateDayTabs(); render();
</script>
</body>
</html>
