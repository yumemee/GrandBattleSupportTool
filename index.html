<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>▶ GRAND WAR MONITOR !!!</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080b0f; --surface: #0f1318; --surface2: #161c24;
    --border: #252d3a; --border2: #1e2736; --text: #c8d8e8; --muted: #4a5568;
    --accent: #3b82f6; --attack: #ef4444; --defense: #22c55e;
    --fallen: #f97316; --battle: #eab308;
    --mono: 'Share Tech Mono', monospace; --sans: 'Noto Sans JP', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 13px; min-height: 100vh; }

  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 16px; position: sticky; top: 0; z-index: 100; }
  .status-bar { background: var(--surface); border-bottom: 1px solid var(--border2); padding: 5px 16px; display: flex; align-items: center; gap: 14px; font-family: var(--mono); font-size: 11px; color: var(--muted); position: sticky; top: 103px; z-index: 99; }
  @media (max-width: 630px) { .status-bar { top: 138px; } }

  .day-tabs { display: flex; gap: 4px; margin-left: 15px; }
  .day-tab { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); padding: 2px 8px; border-radius: 3px; cursor: pointer; font-family: var(--mono); font-size: 10px; }
  .day-tab.active { border-color: var(--accent); color: var(--accent); background: #1a2030; }
  .day-tab.today { border-style: dashed; color: var(--text); }

  h1 { font-family: var(--mono); font-size: 13px; letter-spacing: 2px; color: var(--accent); margin-bottom: 10px; }
  .controls { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .ctrl-group { display: flex; align-items: center; gap: 5px; }
  label { font-size: 11px; color: var(--muted); white-space: nowrap; }
  select, input[type=number] { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 5px 8px; font-size: 12px; font-family: var(--sans); border-radius: 3px; outline: none; }
  button { background: var(--accent); border: 1px solid var(--accent); color: #fff; padding: 5px 14px; font-size: 12px; font-family: var(--sans); border-radius: 3px; cursor: pointer; font-weight: bold; }
  button:hover { opacity: 0.85; }
  button.connected { background: var(--attack); border-color: var(--attack); }
  button.sec { background: transparent; border-color: var(--muted); color: var(--muted); font-weight: normal; }
  #clock { margin-left: auto; font-size: 13px; color: var(--accent); font-weight: bold; letter-spacing: 1px; }

  .main { padding: 12px 16px; }
  .api-error { background: #2a0a0a; border: 1px solid #5a2020; border-radius: 4px; padding: 8px 12px; font-size: 11px; color: #f87171; margin-bottom: 10px; display: none; white-space: pre-wrap; }
  .info-note { background: #0d1a2a; border: 1px solid #1a3a5a; border-radius: 4px; padding: 7px 12px; font-size: 11px; color: #6a9fd8; margin-bottom: 10px; }
  .legend { display: flex; gap: 14px; margin-bottom: 10px; flex-wrap: wrap; font-size: 11px; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .lc { width: 9px; height: 9px; border-radius: 2px; }
  
  #tableContainer { width: 100%; overflow-x: auto; }
  table { width: 100%; border-collapse: separate; border-spacing: 0; font-family: var(--mono); font-size: 12px; min-width: 820px; }
  thead th { background: var(--surface2); box-shadow: inset 0 -1px 0 var(--border), inset -1px 0 0 var(--border2); padding: 10px; text-align: left; color: var(--muted); font-size: 11px; white-space: nowrap; position: sticky; top: 0; z-index: 10; }
  tbody tr:hover { background: var(--surface2); }
  td { padding: 6px 10px; border-bottom: 1px solid var(--border2); border-right: 1px solid var(--border2); white-space: nowrap; }
  td:last-child { border-right: none; }
  .cid { color: var(--accent); font-weight: bold; }
  .badge { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: bold; }
  .s2{background:#3d1000;color:var(--fallen)}
  .ca{color:var(--attack)} .cd{color:var(--defense)} .cz{color:var(--muted)} .tc{color:var(--text)} .tf{color:var(--fallen)} .tn{color:var(--border)}

  /* --- 集計カードのデザイン修正：ポイントを上に配置 --- */
  .summary-section { margin-bottom: 24px; border-bottom: 1px solid var(--border); padding-bottom: 16px; }
  .summary-title { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 1px; margin-bottom: 12px; }
  .summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
  .summary-card { background: var(--surface); border: 1px solid var(--border2); padding: 10px 12px; border-radius: 4px; display: flex; flex-direction: column; gap: 4px; }
  .summary-gname { font-size: 12px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: bold; border-bottom: 1px solid var(--border2); padding-bottom: 4px; margin-bottom: 2px; }
  .summary-row { display: flex; justify-content: space-between; align-items: baseline; }
  .summary-label { font-size: 9px; color: var(--muted); font-family: var(--sans); }
  .summary-val-pts { font-family: var(--mono); font-size: 14px; font-weight: bold; color: var(--defense); } /* 拠点ポイント（緑） */
  .summary-val-p { font-family: var(--mono); font-size: 14px; font-weight: bold; color: var(--accent); } /* 配置済み（青） */
  .summary-unit { font-size: 9px; margin-left: 2px; font-weight: normal; }
</style>
</head>
<body>
<header id="header">
  <h1>▶ GRAND WAR MONITOR !!!</h1>
  <div class="controls">
    <div class="ctrl-group"><label>グループID</label><input type="number" id="groupInput" min="1" max="9999" placeholder="例: 165"></div>
    <div class="ctrl-group"><label>クラス</label><select id="classSelect"><option value="3">Grand Master</option><option value="2">Expert Class</option><option value="1">Elite Class</option></select></div>
    <div class="ctrl-group"><label>ブロック</label><select id="blockSelect"><option value="0">Block A</option><option value="1">Block B</option><option value="2">Block C</option><option value="3">Block D</option></select></div>
    <button id="connectBtn">接続</button>
    <button id="resetBtn" class="sec">リセット</button>
    <button id="lookupBtn" class="sec">検索</button>
  </div>
</header>

<div class="status-bar" id="statusBar">
  <span><span class="dot" id="statusDot"></span><span id="statusText">未接続</span></span>
  <div class="day-tabs" id="dayTabs">
    <span class="day-tab" data-day="Tue">TUE</span><span class="day-tab" data-day="Wed">WED</span><span class="day-tab" data-day="Thu">THU</span>
    <span class="day-tab" data-day="Fri">FRI</span><span class="day-tab" data-day="Sat">SAT</span><span class="day-tab" data-day="Sun">SUN</span>
  </div>
  <span id="clock"></span>
</div>

<div class="main">
  <div class="api-error" id="apiError"></div>
  <div id="summaryContainer"></div>
  <div id="tableContainer">
    <div class="no-data"><span>🏰</span>グループIDを入力して接続してください</div>
  </div>
</div>

<script>
const API = 'https://api.mentemori.icu', WS_URL = 'wss://api.mentemori.icu/gvg';
const SL = {0:'−',1:'布告中',2:'陥落',3:'反撃',4:'反撃成功'};
const CNAMES = {1:'アイン',2:'イエソド',3:'マルクト',4:'ケテル',5:'テファレト',6:'クシュル',7:'シトリ',8:'トパズ',9:'メラル',10:'ペリド',11:'ファリア',12:'ラピス',13:'ラリマル',14:'マリン',15:'アメト',16:'ラペン',17:'ジルコン',18:'オニキス',19:'フロライト',20:'ガネット',21:'ルラ'};

let ws=null, wsConnected=false, guilds={}, castles={};
let currentDay = getGvgDaySuffix(), viewDay = getGvgDaySuffix();
let attackStart = {}, defenseStart = {}, fallenStart = {};

function getGvgDaySuffix() {
  const now = new Date();
  if (now.getHours() < 4) now.setDate(now.getDate() - 1);
  const days = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
  let d = days[now.getDay()]; return (d === "Mon") ? "Sun" : d;
}

function loadDayData(day) {
  attackStart = JSON.parse(localStorage.getItem(`gw_atk_${day}`) || '{}');
  defenseStart = JSON.parse(localStorage.getItem(`gw_def_${day}`) || '{}');
  fallenStart = JSON.parse(localStorage.getItem(`gw_fal_${day}`) || '{}');
}

function saveLog() {
  localStorage.setItem(`gw_atk_${currentDay}`, JSON.stringify(attackStart));
  localStorage.setItem(`gw_def_${currentDay}`, JSON.stringify(defenseStart));
  localStorage.setItem(`gw_fal_${currentDay}`, JSON.stringify(fallenStart));
  localStorage.setItem('gw_lastUpdate_v2', Date.now().toString());
}

function updateDayTabs() {
  document.querySelectorAll('.day-tab').forEach(tab => {
    tab.classList.toggle('active', tab.dataset.day === viewDay);
    tab.classList.toggle('today', tab.dataset.day === currentDay);
    tab.onclick = () => { viewDay = tab.dataset.day; loadDayData(viewDay); updateDayTabs(); render(); };
  });
}

function getUniqueKey(cid) {
  const gr = document.getElementById('groupInput').value || '0';
  const cl = document.getElementById('classSelect').value || '0';
  const bl = document.getElementById('blockSelect').value || '0';
  return `${gr}_${cl}_${bl}_${cid}`;
}

const fmtTime = (ts) => {
  if (!ts || ts === 0) return '<span class="tn">−</span>';
  return `<span class="tc">${new Date(Number(ts)).toLocaleTimeString('ja-JP', { hour12: false })}</span>`;
};

async function fetchInitial(gr,cl,bl){
  try {
    const r=await fetch(`${API}/wg/${gr}/globalgvg/${cl}/${bl}/latest`);
    const j=await r.json();
    if(!j.data) return;
    if(j.data.guilds) for(const [id,name] of Object.entries(j.data.guilds)){ guilds[parseInt(id)]=name; guilds[Math.floor(parseInt(id)/1000)]=name; }
    if(j.data.castles) for(const c of j.data.castles){
      const cid=c.CastleId, key = getUniqueKey(cid);
      castles[cid]={ ownerGuildId:Math.floor((c.GuildId||0)/1000), attackerGuildId:Math.floor((c.AttackerGuildId||0)/1000), fallenTs:c.UtcFallenTimeStamp||0, defenseCount:c.DefensePartyCount||0, attackCount:c.AttackPartyCount||0, state:c.GvgCastleState||0 };
      if(viewDay === currentDay) {
        if(castles[cid].attackCount>0 && !attackStart[key]) attackStart[key]=Date.now();
        if(castles[cid].defenseCount>0 && !defenseStart[key]) defenseStart[key]=Date.now();
        saveLog();
      }
    }
    render();
  } catch(e){}
}

function parseMsg(dv,buf){
  let off=0, changed=false;
  while(off+4<=dv.byteLength){
    const sid=dv.getUint32(off,true); off+=4;
    const cid=sid&31;
    if(cid===0){
      const gid=dv.getUint32(off,true); off+=4;
      const nl=dv.getUint8(off); off+=1;
      guilds[gid]=new TextDecoder().decode(new Uint8Array(buf,off,nl)); off+=nl;
      changed=true;
    } else {
      const og=dv.getUint32(off,true); off+=4;
      const ag=dv.getUint32(off,true); off+=4;
      const ft=dv.getUint32(off,true); off+=4;
      const dc=dv.getUint16(off,true); off+=2;
      const ac=dv.getUint16(off,true); off+=2;
      const st=dv.getUint8(off); off+=2;
      const key = getUniqueKey(cid);
      const pv=castles[cid]||{attackCount:0, defenseCount:0, state:0};
      if(currentDay === getGvgDaySuffix()){
        if(ac > 0 && pv.attackCount === 0) { if(!attackStart[key]) attackStart[key]=Date.now(); }
        if(dc > 0 && pv.defenseCount === 0) { if(!defenseStart[key]) defenseStart[key]=Date.now(); }
        if(st === 2 && pv.state !== 2) { if(!fallenStart[key]) fallenStart[key]=Date.now(); }
        saveLog();
      }
      castles[cid]={ownerGuildId:og, attackerGuildId:ag, fallenTs:ft, defenseCount:dc, attackCount:ac, state:st};
      changed=true;
    }
  }
  if(changed && viewDay === currentDay) render();
}

function render(){
  const ct=document.getElementById('tableContainer'), st = document.getElementById('summaryContainer');
  const isToday = (viewDay === currentDay);
  const summary = {};
  
  let h=`<table><thead><tr><th>拠点</th><th>所有ギルド</th><th>攻撃ギルド</th><th>状態</th><th class="cnt">攻撃P</th><th class="cnt">防衛P</th><th>🗡攻撃開始</th><th>🛡防衛開始</th><th>陥落</th></tr></thead><tbody>`;

  for(let i=1; i<=21; i++){
    const c = isToday ? (castles[i] || {ownerGuildId:0, attackerGuildId:0, state:0, attackCount:0, defenseCount:0}) : {ownerGuildId:0, attackerGuildId:0, state:0, attackCount:0, defenseCount:0};
    const key = getUniqueKey(i);
    
    if(isToday){
      if(c.ownerGuildId){
        if(!summary[c.ownerGuildId]) summary[c.ownerGuildId] = {parties:0, pts:0};
        summary[c.ownerGuildId].parties += c.defenseCount;
        let p = (i === 1) ? 4 : ([2,3,4,5].includes(i)) ? 2 : 1;
        summary[c.ownerGuildId].pts += p;
      }
      if(c.attackerGuildId){
        if(!summary[c.attackerGuildId]) summary[c.attackerGuildId] = {parties:0, pts:0};
        summary[c.attackerGuildId].parties += c.attackCount;
      }
    }
    h+=`<tr><td><span class="cid">${i}</span> ${CNAMES[i]||'???'}</td><td>${isToday?gName(c.ownerGuildId):'−'}</td><td>${isToday && c.attackerGuildId?gName(c.attackerGuildId):'−'}</td><td>${isToday?`<span class="badge s${c.state}">${SL[c.state]||'−'}</span>`:'−'}</td><td class="cnt ${isToday && c.attackCount>0?'ca':'cz'}">${isToday?c.attackCount:'−'}</td><td class="cnt ${isToday && c.defenseCount>0?'cd':'cz'}">${isToday?c.defenseCount:'−'}</td><td>${fmtTime(attackStart[key])}</td><td>${fmtTime(defenseStart[key])}</td><td class="${fallenStart[key]?'tf':'tn'}">${fmtTime(fallenStart[key])}</td></tr>`;
  }
  
  if (isToday) {
    let sh = `<div class="summary-section"><div class="summary-title">▶ GUILD STATUS (拠点ポイント / 配置パーティ)</div><div class="summary-grid">`;
    const sorted = Object.keys(summary).sort((a,b) => gName(a).localeCompare(gName(b)));
    for(const gid of sorted) {
      sh += `<div class="summary-card">
        <div class="summary-gname">${gName(gid)}</div>
        <div class="summary-row">
          <span class="summary-label">拠点ポイント:</span>
          <span class="summary-val-pts">${summary[gid].pts}<span class="summary-unit">pts</span></span>
        </div>
        <div class="summary-row">
          <span class="summary-label">配置済み:</span>
          <span class="summary-val-p">${summary[gid].parties}<span class="summary-unit">P</span></span>
        </div>
      </div>`;
    }
    st.innerHTML = sh + `</div></div>`;
  } else { st.innerHTML = ''; }
  ct.innerHTML = h + '</tbody></table>';
}

function gName(id){ const gid=Math.floor(id); return !gid?'−':(guilds[gid]||`ID:${gid}`); }
function connect(){
  const gr=parseInt(document.getElementById('groupInput').value); if(!gr) return;
  if(ws) ws.close(); guilds={}; castles={}; viewDay=currentDay; loadDayData(currentDay); updateDayTabs();
  fetchInitial(gr,document.getElementById('classSelect').value,document.getElementById('blockSelect').value);
  ws=new WebSocket(WS_URL); ws.binaryType='arraybuffer';
  ws.onopen=()=>{ wsConnected=true; document.getElementById('statusDot').className='dot connected'; document.getElementById('statusText').textContent=`G${gr} 接続中`; const buf=new ArrayBuffer(4); new DataView(buf).setUint32(0,(0&31)|((document.getElementById('blockSelect').value&7)<<5)|((gr&255)<<8)|((document.getElementById('classSelect').value&7)<<16),true); ws.send(buf); };
  ws.onmessage=(e)=>parseMsg(new DataView(e.data),e.data);
  ws.onclose=()=>{ wsConnected=false; document.getElementById('statusDot').className='dot'; document.getElementById('statusText').textContent='切断'; };
}

document.getElementById('connectBtn').onclick=connect;
setInterval(()=> { document.getElementById('clock').textContent = new Date().toLocaleTimeString('ja-JP',{hour12:false}); }, 1000);
loadDayData(viewDay); updateDayTabs(); render();
</script>
</body>
</html>
