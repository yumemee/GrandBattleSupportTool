<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>

  * { box-sizing: border-box; margin: 0; padding: 0; }

  .status-bar { background: var(--surface); border-bottom: 1px solid var(--border2); padding: 5px 16px; display: flex; align-items: center; gap: 14px; font-family: var(--mono); font-size: 11px; color: var(--muted); position: sticky; top: 103px; z-index: 99; }
  @media (max-width: 630px) { .status-bar { top: 138px; } }
  .day-tabs { display: flex; gap: 4px; margin-left: 15px; }
  .day-tab { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); padding: 2px 8px; border-radius: 3px; cursor: pointer; font-family: var(--mono); font-size: 10px; }
  .day-tab.active { border-color: var(--accent); color: var(--accent); background: #1a2030; }
  .day-tab.today { border-style: dashed; color: var(--text); }
  h1 { font-family: var(--mono); font-size: 13px; letter-spacing: 2px; color: var(--accent); margin-bottom: 10px; }
  .controls { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .ctrl-group { display: flex; align-items: center; gap: 5px; }
  label { font-size: 11px; color: var(--muted); white-space: nowrap; cursor: pointer; }
  select, input[type=number] { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 5px 8px; font-size: 12px; font-family: var(--sans); border-radius: 3px; outline: none; }

  button:hover { opacity: 0.85; }
  button.connected { background: var(--attack); border-color: var(--attack); }
  button.sec { background: transparent; border-color: var(--muted); color: var(--muted); font-weight: normal; }
  button.sec:hover { border-color: var(--text); color: var(--text); }
  .group-hint { font-size: 11px; color: var(--muted); margin-top: 6px; font-family: var(--mono); }
  .group-hint a { color: var(--accent); text-decoration: none; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); display: inline-block; margin-right: 5px; }
  .dot.connected { background: var(--defense); animation: pulse 2s infinite; }
  .dot.error { background: var(--attack); }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }
  #clock { margin-left: auto; font-size: 13px; color: var(--accent); font-weight: bold; letter-spacing: 1px; }
  .main { padding: 12px 16px; }
  .api-error { background: #2a0a0a; border: 1px solid #5a2020; border-radius: 4px; padding: 8px 12px; font-size: 11px; color: #f87171; margin-bottom: 10px; display: none; white-space: pre-wrap; }
  .info-note { background: #0d1a2a; border: 1px solid #1a3a5a; border-radius: 4px; padding: 7px 12px; font-size: 11px; color: #6a9fd8; margin-bottom: 10px; }
  .legend { display: flex; gap: 14px; margin-bottom: 10px; flex-wrap: wrap; font-size: 11px; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .lc { width: 9px; height: 9px; border-radius: 2px; }
  #tableContainer { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { width: 100%; border-collapse: separate; border-spacing: 0; font-family: var(--mono); font-size: 12px; min-width: 820px; background: var(--bg); }
  thead th { background: var(--surface2); box-shadow: inset 0 -1px 0 var(--border), inset -1px 0 0 var(--border2); padding: 10px; text-align: left; color: var(--muted); font-size: 11px; white-space: nowrap; position: sticky; top: 0; z-index: 10; }
  thead th:first-child { position: sticky; left: 0; z-index: 11; background: var(--surface2); }
  tbody tr { border-bottom: 1px solid var(--border2); }
  tbody tr:hover td { background: var(--surface2); }
  td { padding: 6px 10px; border-bottom: 1px solid var(--border2); border-right: 1px solid var(--border2); white-space: nowrap; }
  td:last-child { border-right: none; }
  tbody td:first-child { position: sticky; left: 0; z-index: 9; background: var(--surface); border-right: 1px solid var(--border); }
  tbody tr:hover td:first-child { background: var(--surface2); }
  .cid-cell { display: flex; align-items: center; gap: 8px; }
  .cid { color: var(--accent); font-weight: bold; min-width: 20px; text-align: center; }

  .guild { max-width: 140px; overflow: hidden; text-overflow: ellipsis; }
  .atk-g { color: var(--attack); }
  .badge { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: bold; }
  .s0{background:#1a2030;color:var(--muted)} .s1{background:#3d2e00;color:var(--battle)}
  .s2{background:#3d1000;color:var(--fallen)} .s3{background:#3d1800;color:#f97316} .s4{background:#0d3020;color:var(--defense)}
  .cnt { text-align: center; }
  .ca{color:var(--attack)} .cd{color:var(--defense)} .cz{color:var(--muted)}
  .tc{color:var(--text)} .tu{color:var(--muted);font-size:11px} .tn{color:var(--border)} .tf{color:var(--fallen)}
  .no-data { text-align: center; padding: 50px 20px; color: var(--muted); font-family: var(--mono); }
  .no-data span { display: block; font-size: 28px; margin-bottom: 10px; opacity: .25; }
  #lookupResult { display: none; margin-bottom: 10px; }
  #lookupResult .title { font-size: 11px; color: var(--muted); margin-bottom: 5px; font-family: var(--mono); }
  #groupList { display: flex; gap: 6px; flex-wrap: wrap; }

  .summary-count span { font-size: 10px; margin-left: 4px; color: var(--muted); }
</style>

<body>

      <h3 style="font-family: var(--mono); font-size: 12px; color: var(--muted); margin: 0;">🗺️ GLOBAL GVG MAP</h3>
      <button id="closeMapBtn" class="sec" style="padding: 3px 10px; font-size: 11px;">✕ 閉じる</button>

<script>
const API = 'https://api.mentemori.icu';
const WS_URL = 'wss://api.mentemori.icu/gvg';
const SL = {0:'−',1:'布告中',2:'陥落',3:'反撃',4:'反撃成功'};
const CNAMES = {1:'アイン',2:'イエソド',3:'マルクト',4:'ケテル',5:'テファレト',6:'クシュル',7:'シトリ',8:'トパズ',9:'メラル',10:'ペリド',11:'ファリア',12:'ラピス',13:'ラリマル',14:'マリン',15:'アメト',16:'ラペン',17:'ジルコン',18:'オニキス',19:'フロライト',20:'ガネット',21:'ルラ'};

const GROUP_WORLDS = { 140: "W149, W150, W151, W152", 141: "W1, W7, W12, W19", 142: "W2, W8, W20, W27", 143: "W3, W4, W13, W31", 144: "W5, W9, W21, W30", 145: "W6, W14, W15, W32", 146: "W10, W18, W24, W29", 147: "W11, W17, W22, W26", 148: "W16, W23, W25, W28", 149: "W33, W54, W60, W63", 150: "W34, W43, W51, W61", 151: "W35, W44, W48, W53", 152: "W36, W38, W47, W64", 153: "W37, W46, TI57, W58", 154: "W39, W52, W56, W62", 155: "W40, W41, W42, W55", 156: "W45, W49, W50, W59", 157: "W65, W67, W78, W96", 158: "W66, W69, W76, W85", 159: "W68, W70, W84, W93", 160: "W71, W75, W82, W89", 161: "W72, W79, W86, W91", 162: "W73, W83, W90, W95", 163: "W74, W80, W87, W94", 164: "W77, W81, W88, W92", 165: "W97, W104, W110, W115", 166: "W98, W103, W108, W113", 167: "W99, W102, W109, W116", 168: "W100, W105, W107, W114", 169: "W101, W106, W111, W112", 170: "W117, W127, W129, W132", 171: "W118, W124, W126, W131", 172: "W119, W121, W122, W125", 173: "W120, W123, W128, W130", 174: "W133, W139, W143, W148", 175: "W134, W137, W142, W145", 176: "W135, W138, W144, W147", 177: "W136, W140, W141, W146", 178: "W153, W154, W155, W156", 179: "W157, W158, W159, W160" };

let ws=null, wsConnected=false;
let guilds={}, castles={}, prevDayCastles={};
let attackStart = {}, defenseStart = {}, fallenStart = {};

function getGvgDaySuffix() {
  const now = new Date();
  const jstString = now.toLocaleString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit', timeZone: 'Asia/Tokyo' });
  const [datePart, timePart] = jstString.split(' ');
  const [year, month, day] = datePart.split('/');
  const [hour] = timePart.split(':');
  const jstDate = new Date(`${year}-${month}-${day}T${timePart}`);
  if (parseInt(hour) < 4) jstDate.setDate(jstDate.getDate() - 1);
  const days = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
  let d = days[jstDate.getDay()];
  return (d === "Mon") ? "Sun" : d;
}

let currentDay = getGvgDaySuffix();
let viewDay = getGvgDaySuffix();

function syncFirebase() {
  const gr = document.getElementById('groupInput').value;
  if (!gr || !window.fbDB) return;
  const path = `gvg_logs/G${gr}/${viewDay}`;
  const logRef = window.fbRef(window.fbDB, path);
  window.fbOnValue(logRef, (snapshot) => {
    const data = snapshot.val() || {};
    if (data.attack) attackStart = { ...attackStart, ...data.attack };
    if (data.defense) defenseStart = { ...defenseStart, ...data.defense };
    if (data.fallen) fallenStart = { ...fallenStart, ...data.fallen };
    render();
  });
}

function loadDayData(day) {
  attackStart = JSON.parse(localStorage.getItem(`gw_atk_${day}`) || '{}');
  defenseStart = JSON.parse(localStorage.getItem(`gw_def_${day}`) || '{}');
  fallenStart = JSON.parse(localStorage.getItem(`gw_fal_${day}`) || '{}');
  prevDayCastles = JSON.parse(localStorage.getItem(`gw_castles_${day}`) || '{}');
  syncFirebase();
}

function saveLog() {
  localStorage.setItem(`gw_atk_${currentDay}`, JSON.stringify(attackStart));
  localStorage.setItem(`gw_def_${currentDay}`, JSON.stringify(defenseStart));
  localStorage.setItem(`gw_fal_${currentDay}`, JSON.stringify(fallenStart));
  localStorage.setItem(`gw_castles_${currentDay}`, JSON.stringify(castles));
}

function updateDayTabs() {
  document.querySelectorAll('.day-tab').forEach(tab => {
    tab.classList.toggle('active', tab.dataset.day === viewDay);
    tab.classList.toggle('today', tab.dataset.day === currentDay);
    tab.onclick = () => {
      viewDay = tab.dataset.day;
      loadDayData(viewDay);
      updateDayTabs();
      render();
    };
  });
}

const getUniqueKey = (cid) => `${cid}`; 

setInterval(() => {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('ja-JP', { hour12: false, timeZone: 'Asia/Tokyo' });
  const newDay = getGvgDaySuffix();
  if (newDay !== currentDay) {
    saveLog();
    currentDay = newDay; viewDay = newDay;
    loadDayData(currentDay); updateDayTabs(); render();
  }
}, 1000);

function updateStickyPos() {
  const h = document.getElementById('header').offsetHeight;
  const s = document.getElementById('statusBar');
  if(s) s.style.top = h + 'px';
}
window.addEventListener('resize', updateStickyPos);
updateStickyPos();

const mkSid=(cid,bl,gr,cl,wd)=>(cid&31)|((bl&7)<<5)|((gr&255)<<8)|((cl&7)<<16)|((wd&0x1FFF)<<19);
const pSid=v=>({castleId:v&31,block:(v>>>5)&7,group:(v>>>8)&255,gvgClass:(v>>>16)&7,worldId:(v>>>19)&0x1FFF});

const err=(m)=>{ const e=document.getElementById('apiError'); e.textContent=m; e.style.display='block'; };
const hideErr=()=>{ document.getElementById('apiError').style.display='none'; };
const gName=(id)=>!id?'−':(guilds[id]||`ID:${id}`);

const fmtTime = (ts) => {
  if (!ts || ts === 0 || ts === '−') return '<span class="tn">−</span>';
  if (ts === 'before') return '<span class="tu">接続前</span>';
  const d = new Date(Number(ts));
  if (isNaN(d.getTime())) return '<span class="tn">−</span>';
  return `<span class="tc">${d.toLocaleTimeString('ja-JP', { hour12: false, timeZone: 'Asia/Tokyo' })}</span>`;
};

const setStat=(t,tx)=>{ 
  document.getElementById('statusDot').className='dot'+(t?' '+t:''); 
  document.getElementById('statusText').textContent=tx;
  updateStickyPos();
};

document.getElementById('lookupBtn').addEventListener('click', async()=>{
  const btn=document.getElementById('lookupBtn');
  btn.disabled=true; btn.textContent='...'; hideErr();
  try {
    const r=await fetch(`${API}/wgroups`);
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const j=await r.json();
    const gs=(j.data||[]).filter(g=>g.globalgvg);
    const res=document.getElementById('lookupResult');
    const list=document.getElementById('groupList');
    list.innerHTML='';
    if(!gs.length){ list.innerHTML='<span style="color:var(--muted)">データなし</span>'; }
    else gs.forEach(g=>{
      const b=document.createElement('button');
      b.className='sec'; 
      const gId = g.group_id;
      const wInfo = GROUP_WORLDS[gId] ? ` (${GROUP_WORLDS[gId]})` : "";
      b.style.cssText='font-size:11px;padding:6px 12px;font-family:var(--mono);text-align:left;white-space:nowrap;';
      b.textContent=`G${gId}${wInfo}`;
      b.onclick=()=>{ document.getElementById('groupInput').value=gId; res.style.display='none'; updateStickyPos(); };
      list.appendChild(b);
    });
    res.style.display='block';
    updateStickyPos();
  } catch(e){ err('取得失敗'); }
  finally{ btn.disabled=false; btn.textContent='検索'; }
});

async function fetchInitial(gr,cl,bl){
  try {
    // API仕様に合わせるための変換
    const classMap = { "3": "grand", "2": "expert", "1": "elite" };
    const blockMap = ["a", "b", "c", "d"];
    const r=await fetch(`${API}/wg/${gr}/globalgvg/${classMap[cl]}/${blockMap[bl]}/latest`);
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const j=await r.json();
    if(!j.data) return;
    if(j.data.guilds) for(const [id,name] of Object.entries(j.data.guilds)){
      const fi=parseInt(id); guilds[fi]=name; guilds[Math.floor(fi/1000)]=name;
    }
    if(j.data.castles) for(const c of j.data.castles){
      const cid=c.CastleId; const key = getUniqueKey(cid);
      castles[cid]={
        ownerGuildId:Math.floor((c.GuildId||0)/1000), attackerGuildId:Math.floor((c.AttackerGuildId||0)/1000),
        fallenTs:c.UtcFallenTimeStamp?c.UtcFallenTimeStamp:0, defenseCount:c.DefensePartyCount||0,
        attackCount:c.AttackPartyCount||0, state:c.GvgCastleState||0
      };
      if(viewDay === currentDay) {
        if(castles[cid].attackCount>0 && !attackStart[key]) attackStart[key]='before';
        if(castles[cid].defenseCount>0 && !defenseStart[key]) defenseStart[key]='before';
        if(castles[cid].state===2 && c.UtcFallenTimeStamp && !fallenStart[key]) fallenStart[key] = c.UtcFallenTimeStamp * 1000;
        saveLog();
      }
    }
    render();
  } catch(e){ err('初期データ取得失敗'); }
}

function connect(){
  const gr=parseInt(document.getElementById('groupInput').value);
  const cl=parseInt(document.getElementById('classSelect').value);
  const bl=parseInt(document.getElementById('blockSelect').value);
  if(!gr||isNaN(gr)){ err('グループIDを入力'); return; }
  hideErr();
  if(ws){ ws.close(); ws=null; }
  guilds={}; castles={}; 
  setStat('connecting','接続中...');
  viewDay = currentDay; loadDayData(currentDay); updateDayTabs();
  render(); fetchInitial(gr,cl,bl);
  ws=new WebSocket(WS_URL); ws.binaryType='arraybuffer';
  ws.onopen=()=>{
    wsConnected=true; setStat('connected',`G${gr} / B${'ABCD'[bl]}`);
    document.getElementById('connectBtn').textContent='停止';
    document.getElementById('connectBtn').classList.add('connected');
    const buf=new ArrayBuffer(4); new DataView(buf).setUint32(0,mkSid(0,bl,gr,cl,0),true); ws.send(buf);
  };
  ws.onmessage=(e)=>parseMsg(new DataView(e.data),e.data);
  ws.onclose=()=>{ wsConnected=false; setStat('','接続'); document.getElementById('connectBtn').textContent='接続'; document.getElementById('connectBtn').classList.remove('connected'); };
}

document.getElementById('connectBtn').addEventListener('click',()=>wsConnected?(ws.close(),ws=null):connect());

// --- MAPボタン修正版 ---
document.getElementById('mapBtn').addEventListener('click', () => {
  const gr = document.getElementById('groupInput').value;
  const cl = document.getElementById('classSelect').value;
  const bl = document.getElementById('blockSelect').value;
  if(!gr) { err('グループIDを入力してください'); return; }

  const classNames = { "3": "grand", "2": "expert", "1": "elite" };
  const blockNames = ["a", "b", "c", "d"];
  
  // 正しいディレクトリ構造のURLを生成
  const mapUrl = `${API}/wg/${gr}/globalgvg/${classNames[cl]}/${blockNames[bl]}/map.gif`;
  
  const mapImg = document.getElementById('mapImage');
  mapImg.onerror = function() {
    this.style.display = 'none';
    alert("MAP画像の取得に失敗しました。時間外かデータが未生成です。");
  };
  mapImg.onload = function() { this.style.display = 'block'; };
  
  mapImg.src = mapUrl;
  document.getElementById('mapPanel').style.display = 'block';
  
  setTimeout(() => {
    document.getElementById('mapPanel').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 100);
});

document.getElementById('closeMapBtn').addEventListener('click', () => {
  document.getElementById('mapPanel').style.display = 'none';
});

document.getElementById('resetBtn').addEventListener('click',()=>{
  if(!confirm(`${viewDay}のログをリセットしますか？`)) return;
  attackStart = {}; defenseStart = {}; fallenStart = {};
  if(wsConnected && viewDay === currentDay) {
    for(let i in castles) {
      const key = getUniqueKey(i);
      if(castles[i].attackCount>0) attackStart[key]='before';
      if(castles[i].defenseCount>0) defenseStart[key]='before';
    }
  }
  saveLog(); render();
});

function parseMsg(dv,buf){
  let off=0,changed=false;
  while(off+4<=dv.byteLength){
    const sid=dv.getUint32(off,true);
    const p=pSid(sid); off+=4;
    if(p.castleId===0){
      if(off+4>dv.byteLength) break;
      const gid=dv.getUint32(off,true); off+=4; if(!gid) continue;
      const nl=dv.getUint8(off); off+=1;
      guilds[gid]=new TextDecoder().decode(new Uint8Array(buf,off,nl)); off+=nl; changed=true;
    } else {
      if(off+20>dv.byteLength) break;
      const og=dv.getUint32(off,true); const ag=dv.getUint32(off,true);
      const ft=dv.getUint32(off,true); const dc=dv.getUint16(off,true);
      const ac=dv.getUint16(off,true); const st=dv.getUint8(off);
      off+=20; const cid=p.castleId; const key = getUniqueKey(cid);
      const pv=castles[cid]||{attackCount:0, defenseCount:0, fallenTs:0, state:0};
      if(currentDay === getGvgDaySuffix()) {
        let logUpdated = false;
        if(ac > 0 && (pv.attackCount === 0 || !attackStart[key])) {
          if(!attackStart[key] || attackStart[key] === 'before') { attackStart[key] = Date.now(); logUpdated = true; }
        }
        if(dc > 0 && (pv.defenseCount === 0 || !defenseStart[key])) {
          if(!defenseStart[key] || defenseStart[key] === 'before') { defenseStart[key] = Date.now(); logUpdated = true; }
        }
        if(st === 2 && (pv.state !== 2 || !fallenStart[key])) {
          if(!fallenStart[key]) { fallenStart[key] = ft > 0 ? ft * 1000 : Date.now(); logUpdated = true; }
        }
        if(logUpdated) saveLog();
      }
      castles[cid]={ownerGuildId:og,attackerGuildId:ag,fallenTs:ft,defenseCount:dc,attackCount:ac,state:st};
      changed=true;
    }
  }
  if(changed && viewDay === currentDay) render();
}

function render(){
  const ct=document.getElementById('tableContainer');
  const st = document.getElementById('summaryContainer');
  const isToday = (viewDay === currentDay);
  const cids = Array.from({length:21},(_,i)=>i+1);
  const summary = {};
  
  let h=`<table><thead><tr><th>拠点</th><th>所有ギルド</th><th>攻撃ギルド</th><th>状態</th><th class="cnt">攻撃P</th><th class="cnt">防衛P</th><th>🗡攻撃開始</th><th>🛡防衛開始</th><th>陥落</th></tr></thead><tbody>`;
  for(const cid of cids){
    const c = isToday ? (castles[cid] || {ownerGuildId:0, attackerGuildId:0, state:0, attackCount:0, defenseCount:0, fallenTs:0}) : (prevDayCastles[cid] || {ownerGuildId:0, attackerGuildId:0, state:0, attackCount:0, defenseCount:0, fallenTs:0});
    const cname = CNAMES[cid] || '???'; const key = getUniqueKey(cid);
    if(isToday && c.ownerGuildId) summary[c.ownerGuildId] = (summary[c.ownerGuildId] || 0) + c.defenseCount;
    if(isToday && c.attackerGuildId) summary[c.attackerGuildId] = (summary[c.attackerGuildId] || 0) + c.attackCount;
    const dispFal = fallenStart[key] || 0;
    h+=`<tr><td><div class="cid-cell"><span class="cid">${cid}</span><span class="cname">${cname}</span></div></td><td class="guild">${c.ownerGuildId ? gName(c.ownerGuildId) : '<span class="tn">−</span>'}</td><td class="guild atk-g">${c.attackerGuildId ? gName(c.attackerGuildId) : '<span class="tn">−</span>'}</td><td>${c.state ? `<span class="badge s${c.state}">${SL[c.state]||c.state}</span>` : '<span class="tn">−</span>'}</td><td class="cnt ${c.attackCount>0?'ca':'cz'}">${isToday ? c.attackCount : '−'}</td><td class="cnt ${c.defenseCount>0?'cd':'cz'}">${c.defenseCount || '−'}</td><td>${isToday ? fmtTime(attackStart[key]) : '<span class="tn">−</span>'}</td><td>${isToday ? fmtTime(defenseStart[key]) : '<span class="tn">−</span>'}</td><td class="${dispFal && isToday ? 'tf' : 'tn'}">${isToday ? fmtTime(dispFal) : '<span class="tn">−</span>'}</td></tr>`;
  }
  if (isToday) {
    let sh = `<div class="summary-section"><div class="summary-title">▶ TOTAL ACTIVE PARTIES</div><div class="summary-grid">`;
    const sortedGuilds = Object.keys(summary).sort((a,b) => gName(a).localeCompare(gName(b)));
    for(const gid of sortedGuilds) {
      if(summary[gid] === 0) continue; 
      sh += `<div class="summary-card"><div class="summary-gname">${gName(gid)}</div><div class="summary-count">${summary[gid]}<span>P</span></div></div>`;
    }
    st.innerHTML = sh + `</div></div>`;
  } else { st.innerHTML = ''; }
  ct.innerHTML = h + '</tbody></table>';
}

loadDayData(viewDay);
updateDayTabs();
render();
</script>
