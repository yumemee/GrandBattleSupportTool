<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>▶ GRAND WAR MONITOR [CLOUD]</title>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  // --- 【重要】ここにFirebaseのコンソールから取得した設定を貼り付けてください ---
  const firebaseConfig = {
  apiKey: "AIzaSyCBuEBsIBE8hhU50epc8CtyeJn_gQLM2rc",
  authDomain: "grand-war-monitor.firebaseapp.com",
  databaseURL: "https://grand-war-monitor-default-rtdb.firebaseio.com",
  projectId: "grand-war-monitor",
  storageBucket: "grand-war-monitor.firebasestorage.app",
  messagingSenderId: "16814509264",
  appId: "1:16814509264:web:5dcad8ec49928d13c362d5"
};

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // 外部から呼べるようにグローバルに配置
  window.db = db;
  window.dbRef = ref;
  window.onValue = onValue;
</script>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
  /* 前回のCSSをそのまま継承 */
  :root {
    --bg: #080b0f; --surface: #0f1318; --surface2: #161c24;
    --border: #252d3a; --border2: #1e2736; --text: #c8d8e8; --muted: #4a5568;
    --accent: #3b82f6; --attack: #ef4444; --defense: #22c55e;
    --fallen: #f97316; --battle: #eab308;
    --mono: 'Share Tech Mono', monospace; --sans: 'Noto Sans JP', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 13px; min-height: 100vh; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 16px; position: sticky; top: 0; z-index: 100; }
  .status-bar { background: var(--surface); border-bottom: 1px solid var(--border2); padding: 5px 16px; display: flex; align-items: center; gap: 14px; font-family: var(--mono); font-size: 11px; color: var(--muted); position: sticky; top: 103px; z-index: 99; }
  .day-tabs { display: flex; gap: 4px; margin-left: 15px; }
  .day-tab { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); padding: 2px 8px; border-radius: 3px; cursor: pointer; font-family: var(--mono); font-size: 10px; }
  .day-tab.active { border-color: var(--accent); color: var(--accent); background: #1a2030; }
  .day-tab.today { border-style: dashed; color: var(--text); }
  h1 { font-family: var(--mono); font-size: 13px; letter-spacing: 2px; color: var(--accent); margin-bottom: 10px; }
  .controls { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .ctrl-group { display: flex; align-items: center; gap: 5px; }
  label { font-size: 11px; color: var(--muted); white-space: nowrap; }
  select, input[type=number] { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 5px 8px; font-size: 12px; font-family: var(--sans); border-radius: 3px; outline: none; }
  button { background: var(--accent); border: 1px solid var(--accent); color: #fff; padding: 5px 14px; font-size: 12px; font-family: var(--sans); border-radius: 3px; cursor: pointer; font-weight: bold; }
  #clock { margin-left: auto; font-size: 13px; color: var(--accent); font-weight: bold; }
  .main { padding: 12px 16px; }
  table { width: 100%; border-collapse: separate; border-spacing: 0; font-family: var(--mono); font-size: 12px; min-width: 820px; }
  thead th { background: var(--surface2); padding: 10px; text-align: left; color: var(--muted); position: sticky; top: 0; }
  td { padding: 6px 10px; border-bottom: 1px solid var(--border2); }
  .cid { color: var(--accent); font-weight: bold; }
  .badge { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: bold; }
  .s0{background:#1a2030;color:var(--muted)} .s4{background:#0d3020;color:var(--defense)}
  .tf{color:var(--fallen)} .tc{color:var(--text)}
</style>
</head>
<body>
<header id="header">
  <h1>▶ GRAND WAR MONITOR [CLOUD]</h1>
  <div class="controls">
    <div class="ctrl-group"><label>グループID</label><input type="number" id="groupInput" value="165"></div>
    <div class="ctrl-group">
      <label>クラス</label>
      <select id="classSelect"><option value="3">GM</option><option value="2">Expert</option><option value="1">Elite</option></select>
    </div>
    <div class="ctrl-group">
      <label>ブロック</label>
      <select id="blockSelect"><option value="0">A</option><option value="1">B</option><option value="2">C</option><option value="3">D</option></select>
    </div>
    <button id="connectBtn">接続</button>
  </div>
</header>

<div class="status-bar">
  <span id="statusText">クラウド同期待機中...</span>
  <div class="day-tabs" id="dayTabs">
    <span class="day-tab" data-day="Tue">TUE</span><span class="day-tab" data-day="Wed">WED</span><span class="day-tab" data-day="Thu">THU</span>
    <span class="day-tab" data-day="Fri">FRI</span><span class="day-tab" data-day="Sat">SAT</span><span class="day-tab" data-day="Sun">SUN</span>
  </div>
  <span id="clock"></span>
</div>

<div class="main">
  <div id="tableContainer">
    <div class="no-data">クラウドからデータを読み込んでいます...</div>
  </div>
</div>

<script>
const CNAMES = {1:'アイン',2:'イエソド',3:'マルクト',4:'ケテル',5:'テファレト',6:'クシュル',7:'シトリ',8:'トパズ',9:'メラル',10:'ペリド',11:'ファリア',12:'ラピス',13:'ラリマル',14:'マリン',15:'アメト',16:'ラペン',17:'ジルコン',18:'オニキス',19:'フロライト',20:'ガネット',21:'ルラ'};
let attackStart = {}, defenseStart = {}, fallenStart = {};
let viewDay = "Tue"; // 初期値、後で自動設定

// 時計
setInterval(() => {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('ja-JP',{hour12:false});
}, 1000);

// クラウド（Firebase）からデータを取得する関数
function syncLogs() {
  const gr = document.getElementById('groupInput').value;
  const path = `gvg_logs/G${gr}/${viewDay}`;
  
  if (!window.db) return setTimeout(syncLogs, 500); // SDKロード待ち

  const logRef = window.dbRef(window.db, path);
  window.onValue(logRef, (snapshot) => {
    const data = snapshot.val() || {};
    attackStart = data.attack || {};
    defenseStart = data.defense || {};
    fallenStart = data.fallen || {};
    document.getElementById('statusText').textContent = `Sync: G${gr} (${viewDay})`;
    render();
  });
}

function fmtTime(ts) {
  if (!ts) return '<span style="color:#252d3a">−</span>';
  const d = new Date(Number(ts));
  return `<span class="tc">${d.toLocaleTimeString('ja-JP', { hour12: false })}</span>`;
}

function render() {
  const ct = document.getElementById('tableContainer');
  let h = `<table><thead><tr><th>拠点</th><th>🗡攻撃開始</th><th>🛡防衛開始</th><th>陥落</th></tr></thead><tbody>`;

  for (let i = 1; i <= 21; i++) {
    const cid = i;
    h += `<tr>
      <td><span class="cid">${cid}</span> <span style="font-size:11px">${CNAMES[cid]}</span></td>
      <td>${fmtTime(attackStart[cid])}</td>
      <td>${fmtTime(defenseStart[cid])}</td>
      <td class="tf">${fmtTime(fallenStart[cid])}</td>
    </tr>`;
  }
  ct.innerHTML = h + '</tbody></table>';
}

document.getElementById('connectBtn').onclick = syncLogs;

// 起動時の処理
window.onload = () => {
  const days = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
  viewDay = days[new Date().getDay()];
  if(viewDay === "Mon") viewDay = "Sun"; // 月曜は日曜扱い
  syncLogs();
};
</script>
</body>
</html>
